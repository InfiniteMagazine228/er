<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mario 2D Parkour Ultra Online</title>
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #fps-display { position: absolute; top: 15px; left: 15px; background: rgba(11, 11, 25, 0.85); padding: 15px; border-radius: 10px; border: 2px solid #00f0ff; pointer-events: none; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); font-size: 14px; min-width: 120px; }
        #ui { position: absolute; top: 15px; right: 15px; background: rgba(11, 11, 25, 0.85); padding: 15px; border-radius: 10px; border: 2px solid #ff007f; pointer-events: none; max-width: 260px; box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); }
        #leaderboard { position: absolute; bottom: 15px; left: 15px; background: rgba(11, 11, 25, 0.85); padding: 15px; border-radius: 10px; border: 2px solid #ffd700; min-width: 180px; pointer-events: none; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        .key { background: #222; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: #ffd700; border: 1px solid #444; }
        h2, h3 { margin: 0 0 8px 0; color: #ffd700; text-shadow: 0 0 5px rgba(255,215,0,0.3); }
    </style>
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="fps-display">
        <b style="font-size: 16px; color:#00f0ff;">⚡ ENGINE STATS</b><br><br>
        💻 FPS: <span id="fps-value" style="color:#00ff88; font-weight:bold;">60</span><br>
        🏆 Điểm bục: <span id="my-score" style="color:#ffd700; font-weight:bold;">0</span>
    </div>

    <div id="ui">
        <h2>🍄 HƯỚNG DẪN</h2>
        <p>🕹️ Chạy bộ: <span class="key">A</span> (Trái) | <span class="key">D</span> (Phải)</p>
        <p>🚀 Nhảy / Nhảy tường: <span class="key">Space</span> hoặc <span class="key">W</span></p>
        <p>⚡ Trượt dài (Slide): Giữ <span class="key">Shift trái</span></p>
    </div>

    <div id="leaderboard">
        <h3>🏆 BẢNG XẾP HẠNG</h3>
        <div id="player-list"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const socket = io({ path: '/socket.io/', transports: ['polling'] });
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let px = 100, py = 300;
        let vx = 0, vy = 0;
        let pWidth = 32, pHeight = 46;
        let isGrounded = false;
        let isSliding = false;
        let isWallSliding = false;
        let wallDir = 0;
        let myScore = 0;
        let cameraX = 0;

        let otherPlayers = {};
        let keys = { a: false, d: false, space: false, w: false, shift: false };

        let lastFpsUpdate = 0;
        let frameCount = 0;
        let fps = 60;

        let particles = [];

        window.addEventListener('keydown', (e) => handleKey(e, true));
        window.addEventListener('keyup', (e) => handleKey(e, false));

        function handleKey(e, isDown) {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = isDown;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = isDown;
            if (e.code === 'Space') keys.space = isDown;
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = isDown;
            if (e.code === 'ShiftLeft') keys.shift = isDown;
        }

        let platforms = [
            { x: 0,    y: 520, w: 500,  h: 120, type: 'ground', col: '#b84418' }, 
            { x: 620,  y: 440, w: 140,  h: 35,  type: 'brick',  col: '#fcb444' }, 
            { x: 850,  y: 360, w: 140,  h: 35,  type: 'bounce', col: '#ffff00' }, 
            { x: 1080, y: 240, w: 40,   h: 220, type: 'wall',   col: '#92a8d1' }, 
            { x: 1240, y: 160, w: 40,   h: 300, type: 'wall',   col: '#92a8d1' }, 
            { x: 1400, y: 320, w: 150,  h: 35,  type: 'moving', col: '#9900ff', startY: 320, range: 120, speed: 2, dir: 1 }, 
            { x: 1650, y: 410, w: 140,  h: 35,  type: 'slide-gate', col: '#6b5b95' },
            { x: 1900, y: 520, w: 600,  h: 120, type: 'ground', col: '#00a800' }  
        ];

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    radius: Math.random() * 4 + 2,
                    alpha: 1,
                    color: color
                });
            }
        }

        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id !== socket.id) otherPlayers[id] = players[id];
            });
            updateLeaderboard(players);
        });
        socket.on('newPlayer', (info) => { otherPlayers[info.id] = info; });
        socket.on('playerMoved', (info) => { if (otherPlayers[info.id]) otherPlayers[info.id] = info; });
        socket.on('playerDisconnected', (id) => { delete otherPlayers[id]; });
        socket.on('scoreUpdated', (players) => { updateLeaderboard(players); });

        function updateLeaderboard(players) {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            Object.keys(players).forEach(id => {
                const name = id === socket.id ? "Bạn 😎" : `User_${id.substring(0,4)}`;
                list.innerHTML += `<p style="margin:4px 0;">${name}: <b style="color:#00ff88">${players[id].score || 0} bục</b></p>`;
            });
        }

        function loop(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate >= 1000) {
                fps = Math.round((frameCount * 1000) / (timestamp - lastFpsUpdate));
                document.getElementById('fps-value').innerText = fps;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            platforms.forEach(plat => {
                if (plat.type === 'moving') {
                    plat.y += plat.speed * plat.dir;
                    if (Math.abs(plat.y - plat.startY) > plat.range) plat.dir *= -1;
                }
            });

            let targetSpeed = keys.shift && isGrounded ? 7.5 : 4.5;
            if (keys.shift && isGrounded && (keys.a || keys.d)) {
                if (!isSliding) {
                    isSliding = true;
                    pHeight = 24;
                    py += 22;
                }
            } else if (!keys.shift && isSliding) {
                isSliding = false;
                pHeight = 46;
                py -= 22;
            }

            if (keys.a) vx = -targetSpeed;
            else if (keys.d) vx = targetSpeed;
            else vx *= 0.85;

            if (isWallSliding) {
                vy += 0.15;
                if (vy > 2) vy = 2;
            } else {
                vy += 0.55; 
            }

            px += vx;
            py += vy;

            if (isSliding && Math.abs(vx) > 2 && Math.random() < 0.4) {
                createParticles(px + pWidth/2, py + pHeight, '#fff', 2);
            }

            isGrounded = false;
            isWallSliding = false;
            wallDir = 0;
            let currentPlatformIdx = 0;

            platforms.forEach((plat, idx) => {
                if (px + pWidth > plat.x && px < plat.x + plat.w) {
                    let platTop = plat.y;
                    if (plat.type === 'slide-gate') platTop = plat.y + 15;
                    
                    if (py + pHeight <= platTop && py + pHeight + vy >= platTop) {
                        py = platTop - pHeight;
                        vy = 0;
                        isGrounded = true;
                        currentPlatformIdx = idx;

                        if (plat.type === 'bounce') {
                            vy = -14.5;
                            isGrounded = false;
                            createParticles(px + pWidth/2, plat.y, '#ffff00', 12);
                        }
                        if (plat.type === 'moving') {
                            py += plat.speed * plat.dir;
                        }
                    }
                }

                if (plat.type === 'wall' && !isGrounded) {
                    if (py + pHeight > plat.y && py < plat.y + plat.h) {
                        if (px + pWidth <= plat.x && px + pWidth + vx >= plat.x && keys.d) {
                            isWallSliding = true;
                            wallDir = -1;
                        }
                        else if (px >= plat.x + plat.w && px + vx <= plat.x + plat.w && keys.a) {
                            isWallSliding = true;
                            wallDir = 1;
                        }
                    }
                }
            });

            if ((keys.space || keys.w)) {
                if (isGrounded) {
                    vy = -12.5;
                    isGrounded = false;
                    createParticles(px + pWidth/2, py + pHeight, '#eee', 5);
                } else if (isWallSliding) {
                    vy = -11;
                    vx = wallDir * 6.5;
                    px += vx;
                    isWallSliding = false;
                    createParticles(wallDir === 1 ? px : px + pWidth, py + pHeight/2, '#92a8d1', 8);
                }
            }

            if (isGrounded && currentPlatformIdx > myScore) {
                myScore = currentPlatformIdx;
                document.getElementById('my-score').innerText = myScore;
                socket.emit('updateScore', myScore);
            }

if (py > canvas.height + 150 || px < -200) {px = 100;py = 300;vx = 0;vy = 0;if (isSliding) {isSliding = false;pHeight = 46;}}cameraX = px - canvas.width / 4;if (cameraX < 0) cameraX = 0;socket.emit('playerMovement', { x: px, y: py });ctx.clearRect(0, 0, canvas.width, canvas.height);ctx.fillStyle = '#4a90e2';for (let i = 0; i < canvas.width; i += 160) {ctx.fillRect(i - (cameraX * 0.2) % 160, 150, 80, 40);}ctx.save();ctx.translate(-cameraX, 0);ctx.fillStyle = '#f8d870';ctx.beginPath();ctx.arc(250, 90, 35, 0, Math.PI * 2);ctx.fill();platforms.forEach(plat => {ctx.fillStyle = plat.col;let drawH = (plat.type === 'ground' || plat.type === 'wall') ? canvas.height - plat.y + 100 : plat.h;if (plat.type === 'slide-gate') {ctx.fillRect(plat.x, plat.y, plat.w, 10);ctx.fillRect(plat.x, plat.y + 10, 15, plat.h - 10);ctx.fillRect(plat.x + plat.w - 15, plat.y + 10, 15, plat.h - 10);ctx.strokeStyle = '#000';ctx.lineWidth = 2;ctx.strokeRect(plat.x, plat.y, plat.w, 10);} else {ctx.fillRect(plat.x, plat.y, plat.w, drawH);ctx.strokeStyle = '#000';ctx.lineWidth = 2;ctx.strokeRect(plat.x, plat.y, plat.w, drawH);}if (plat.type === 'brick') {ctx.fillStyle = 'rgba(0,0,0,0.1)';for (let bx = plat.x + 10; bx < plat.x + plat.w; bx += 20) {ctx.fillRect(bx, plat.y + 5, 2, plat.h - 10);}}});Object.keys(otherPlayers).forEach(id => {let p = otherPlayers[id];ctx.fillStyle = p.color || '#e45c10';ctx.fillRect(p.x, p.y, pWidth, pHeight);ctx.strokeStyle = '#000';ctx.lineWidth = 2;ctx.strokeRect(p.x, p.y, pWidth, pHeight);});ctx.fillStyle = '#fc9838';ctx.fillRect(px, py, pWidth, pHeight);ctx.strokeStyle = '#000';ctx.lineWidth = 2;ctx.strokeRect(px, py, pWidth, pHeight);ctx.fillStyle = '#b84418';ctx.fillRect(px + 4, py + 4, pWidth - 8, 10);for (let i = particles.length - 1; i >= 0; i--) {let p = particles[i];p.x += p.vx;p.y += p.vy;p.alpha -= 0.02;if (p.alpha <= 0) {particles.splice(i, 1);continue;}ctx.save();ctx.globalAlpha = p.alpha;ctx.fillStyle = p.color;ctx.beginPath();ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);ctx.fill();ctx.restore();}ctx.restore();requestAnimationFrame(loop);}requestAnimationFrame((timestamp) => {lastFpsUpdate = timestamp;loop(timestamp);});
